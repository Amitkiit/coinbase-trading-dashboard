version: "3.9"

services:

  backend:

    build:
      context: ./backend/coinbase-trading-server

    container_name: trading-backend

    ports:
      - "5000:5000"

    env_file:
      - ./backend/coinbase-trading-server/.env

    restart: always

  frontend:

    build:
      context: ./frontend/client

    container_name: trading-frontend

    ports:
      - "5173:5173"

    env_file:
      - ./frontend/client/.env

    depends_on:
      - backend

    restart: always